<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img">
<style>
text { font-family: Helvetica, Arial, sans-serif; fill: #14213d; }
.title { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; fill: #52607a; }
.axis { font-size: 12px; }
.label { font-size: 12px; font-weight: 700; }
.value { font-size: 12px; font-weight: 700; }
.small { font-size: 11px; fill: #52607a; }
</style>
<rect width="100%" height="100%" fill="#fffdf6"/>
<text x="90" y="38" class="title">DDP Throughput Comparison</text>
<text x="90" y="60" class="subtitle">Samples/sec from the committed W&amp;B benchmark exports. Higher is better.</text>
<line x1="90" y1="460" x2="940" y2="460" stroke="#8d99ae" stroke-width="1.5"/>
<line x1="90" y1="90" x2="90" y2="460" stroke="#8d99ae" stroke-width="1.5"/>
<line x1="90" y1="460.0" x2="940" y2="460.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="464.0" text-anchor="end" class="axis">0.0</text>
<line x1="90" y1="367.5" x2="940" y2="367.5" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="371.5" text-anchor="end" class="axis">0.2</text>
<line x1="90" y1="275.0" x2="940" y2="275.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="279.0" text-anchor="end" class="axis">0.4</text>
<line x1="90" y1="182.5" x2="940" y2="182.5" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="186.5" text-anchor="end" class="axis">0.6</text>
<line x1="90" y1="90.0" x2="940" y2="90.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="94.0" text-anchor="end" class="axis">0.8</text>
<rect x="215.5" y="281.5" width="90" height="178.5" rx="10" fill="#355070"/>
<text x="260.5" y="271.5" text-anchor="middle" class="value">0.386</text>
<text x="260.5" y="482.0" text-anchor="middle" class="axis">1 GPU</text>
<rect x="333.5" y="147.5" width="90" height="312.5" rx="10" fill="#eaac8b"/>
<text x="378.5" y="137.5" text-anchor="middle" class="value">0.676</text>
<text x="378.5" y="482.0" text-anchor="middle" class="axis">2 GPU</text>
<text x="319.5" y="512.0" text-anchor="middle" class="label">Real</text>
<rect x="606.5" y="283.2" width="90" height="176.8" rx="10" fill="#355070"/>
<text x="651.5" y="273.2" text-anchor="middle" class="value">0.382</text>
<text x="651.5" y="482.0" text-anchor="middle" class="axis">1 GPU</text>
<rect x="724.5" y="132.5" width="90" height="327.5" rx="10" fill="#eaac8b"/>
<text x="769.5" y="122.5" text-anchor="middle" class="value">0.708</text>
<text x="769.5" y="482.0" text-anchor="middle" class="axis">2 GPU</text>
<text x="710.5" y="512.0" text-anchor="middle" class="label">Controlled</text>
<rect x="690" y="86" width="16" height="16" rx="3" fill="#355070"/>
<text x="714" y="99" class="axis">1 GPU</text>
<rect x="790" y="86" width="16" height="16" rx="3" fill="#eaac8b"/>
<text x="814" y="99" class="axis">2 GPU</text>
</svg>
